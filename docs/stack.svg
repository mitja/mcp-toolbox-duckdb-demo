<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 880" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="13">
  <defs>
    <marker id="arr-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2c5282"/>
    </marker>
    <marker id="arr-teal" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2c7a7b"/>
    </marker>
    <marker id="arr-orange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#c05621"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#276749"/>
    </marker>
    <marker id="arr-gray" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#718096"/>
    </marker>
    <marker id="arr-purple" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#805ad5"/>
    </marker>
    <style>
      .panel       { fill:#fafbfc; stroke:#cbd5e0; stroke-width:1.5; }
      .panel-title { font-size:13px; font-weight:600; fill:#4a5568; }
      .box         { fill:#fff; stroke-width:1.5; }
      .box-host    { stroke:#3182ce; }
      .box-client  { stroke:#3182ce; }
      .box-server  { stroke:#dd6b20; }
      .box-data    { stroke:#805ad5; }
      .box-obs     { stroke:#38a169; }
      .box-inner   { fill:#f7fafc; stroke:#a0aec0; stroke-width:1; stroke-dasharray:3 2; }
      .label       { font-size:13px; fill:#1a202c; font-weight:600; }
      .sublabel    { font-size:11px; fill:#4a5568; }
      .badge       { font-size:10px; fill:#718096; font-style:italic; }
      .arrow       { fill:none; stroke-width:1.6; }
      .a-blue      { stroke:#2c5282; }
      .a-teal      { stroke:#2c7a7b; }
      .a-orange    { stroke:#c05621; }
    .a-orange-dash { stroke:#c05621; stroke-dasharray:5 3; }
    .a-purple-dash { stroke:#805ad5; stroke-dasharray:5 3; }
      .a-green     { stroke:#276749; stroke-dasharray:5 3; }
      .a-gray      { stroke:#718096; stroke-dasharray:3 2; }
      .arrow-label { font-size:11px; fill:#2d3748; }
      .arrow-label-bg { fill:#fafbfc; }
    </style>
  </defs>

  <!-- Title -->
  <text x="600" y="28" text-anchor="middle" font-size="18" font-weight="700" fill="#1a202c">MCP Toolbox DuckDB + Quack — demo stack</text>
  <text x="600" y="48" text-anchor="middle" font-size="12" fill="#718096">Always-on services have solid borders. Profile-gated services show their compose profile.</text>

  <!-- ====================== HOST PANEL ====================== -->
  <g>
    <rect x="40" y="68" width="1120" height="170" rx="8" class="panel"/>
    <text x="60" y="92" class="panel-title">Host (your laptop · localhost)</text>

    <!-- Claude Code -->
    <rect x="80" y="110" width="200" height="100" rx="6" class="box box-host"/>
    <text x="180" y="140" text-anchor="middle" class="label">Claude Code</text>
    <text x="180" y="160" text-anchor="middle" class="sublabel">MCP client</text>
    <text x="180" y="178" text-anchor="middle" class="sublabel">claude-code/claude_config.example.json</text>
    <text x="180" y="196" text-anchor="middle" class="sublabel">→ http://localhost:5555/mcp</text>

    <!-- curl / notebook -->
    <rect x="310" y="110" width="200" height="100" rx="6" class="box box-host"/>
    <text x="410" y="140" text-anchor="middle" class="label">curl · notebook</text>
    <text x="410" y="160" text-anchor="middle" class="sublabel">REST smoke tests, walkthrough</text>
    <text x="410" y="178" text-anchor="middle" class="sublabel">→ http://localhost:5555/api/...</text>
    <text x="410" y="196" text-anchor="middle" class="sublabel">notebooks/walkthrough.ipynb</text>

    <!-- Browser (three web UIs: Inspector left, Toolbox UI middle, Jaeger right). -->
    <rect x="540" y="110" width="560" height="100" rx="6" class="box box-host"/>
    <text x="820" y="140" text-anchor="middle" class="label">Browser (web UIs)</text>
    <rect x="560" y="158" width="170" height="40" rx="4" fill="#f7fafc" stroke="#cbd5e0"/>
    <text x="645" y="174" text-anchor="middle" class="sublabel">MCP Inspector UI</text>
    <text x="645" y="190" text-anchor="middle" class="sublabel">http://localhost:6274</text>
    <rect x="745" y="158" width="170" height="40" rx="4" fill="#f7fafc" stroke="#cbd5e0"/>
    <text x="830" y="174" text-anchor="middle" class="sublabel">Toolbox UI</text>
    <text x="830" y="190" text-anchor="middle" class="sublabel">http://localhost:5555/ui</text>
    <rect x="930" y="158" width="170" height="40" rx="4" fill="#f7fafc" stroke="#cbd5e0"/>
    <text x="1015" y="174" text-anchor="middle" class="sublabel">Jaeger UI</text>
    <text x="1015" y="190" text-anchor="middle" class="sublabel">http://localhost:16686</text>
  </g>

  <!-- ====================== DOCKER PANEL ====================== -->
  <g>
    <rect x="40" y="262" width="1120" height="558" rx="8" class="panel"/>
    <text x="60" y="286" class="panel-title">Docker Compose network — in-network DNS uses service name</text>

    <!-- ==== Profile-gated clients (top row inside docker) ==== -->
    <rect x="80" y="312" width="200" height="92" rx="6" class="box box-client"/>
    <text x="180" y="340" text-anchor="middle" class="label">trace-client / trace-load</text>
    <text x="180" y="358" text-anchor="middle" class="sublabel">single MCP call · concurrent burst</text>
    <text x="180" y="375" text-anchor="middle" class="sublabel">injects _meta.traceparent</text>
    <text x="180" y="395" text-anchor="middle" class="badge">profile: trace · load</text>

    <rect x="310" y="312" width="200" height="92" rx="6" class="box box-client"/>
    <text x="410" y="340" text-anchor="middle" class="label">langgraph</text>
    <text x="410" y="358" text-anchor="middle" class="sublabel">ReAct agent (Anthropic)</text>
    <text x="410" y="375" text-anchor="middle" class="sublabel">analytics_readonly toolset</text>
    <text x="410" y="395" text-anchor="middle" class="badge">profile: agent · needs ANTHROPIC_API_KEY</text>

    <rect x="540" y="312" width="240" height="92" rx="6" class="box box-client"/>
    <text x="660" y="340" text-anchor="middle" class="label">inspector</text>
    <text x="660" y="358" text-anchor="middle" class="sublabel">MCP Inspector — UI + proxy</text>
    <text x="660" y="375" text-anchor="middle" class="sublabel">UI :6274 · proxy :6277</text>
    <text x="660" y="395" text-anchor="middle" class="badge">profile: inspect</text>

    <!-- ==== Toolbox (center, always-on) ==== -->
    <rect x="80" y="450" width="700" height="170" rx="6" class="box box-server"/>
    <text x="430" y="478" text-anchor="middle" class="label">Toolbox :5000  (mcp-toolbox-duckdb fork, feat/duckdb-quack)</text>
    <text x="430" y="498" text-anchor="middle" class="sublabel">endpoints: /mcp (JSON-RPC streamable HTTP) · /api/tool/&lt;name&gt;/invoke · /api/toolset</text>

    <rect x="120" y="514" width="620" height="92" rx="5" class="box-inner"/>
    <text x="430" y="538" text-anchor="middle" class="label">in-process DuckDB (duckdb-go CGO) — one instance per source · 3 sources</text>
    <text x="430" y="555" text-anchor="middle" class="sublabel">sales-quack + inventory-quack (single-attach) · combined-analytics (multi-attach, both)</text>
    <text x="430" y="572" text-anchor="middle" class="sublabel">LOAD quack · CREATE OR REPLACE SECRET (TYPE quack, TOKEN '...') · ATTACH 'quack:&lt;server&gt;:9494'</text>
    <text x="430" y="589" text-anchor="middle" class="sublabel">policy: max_rows, timeout, statement validator · push_down_to_remote for cross-table joins</text>
    <text x="430" y="603" text-anchor="middle" class="sublabel">reconnect-on-quack-restart · OTel span (duckdb.query) + 5 metrics</text>

    <!-- ==== quack-server and quack-server-2 (always-on, two separate
         DuckDB+Quack processes — same image, different seed mounted). ==== -->
    <rect x="80" y="675" width="340" height="110" rx="6" class="box box-data"/>
    <text x="250" y="704" text-anchor="middle" class="label">quack-server :9494  (sales)</text>
    <text x="250" y="724" text-anchor="middle" class="sublabel">Debian + DuckDB CLI + Quack</text>
    <text x="250" y="742" text-anchor="middle" class="sublabel">seed.sql: sales + orders (~30 rows)</text>
    <text x="250" y="760" text-anchor="middle" class="sublabel">TOKEN auth · read_only authz</text>
    <text x="250" y="778" text-anchor="middle" class="badge">source: sales-quack</text>

    <rect x="440" y="675" width="340" height="110" rx="6" class="box box-data"/>
    <text x="610" y="700" text-anchor="middle" class="label">quack-server-2 :9494  (inventory)</text>
    <text x="610" y="717" text-anchor="middle" class="sublabel">same image, mounted seed-inventory.sql</text>
    <text x="610" y="734" text-anchor="middle" class="sublabel">products (~20 rows)</text>
    <text x="610" y="751" text-anchor="middle" class="sublabel">+ product_price_history VIEW over read_parquet</text>
    <text x="610" y="768" text-anchor="middle" class="sublabel">TOKEN auth · read_only authz</text>
    <text x="610" y="781" text-anchor="middle" class="badge">source: inventory-quack</text>

    <!-- ==== observability column (always-on) ==== -->
    <rect x="820" y="450" width="320" height="92" rx="6" class="box box-obs"/>
    <text x="980" y="479" text-anchor="middle" class="label">otel-collector :4317 / :4318</text>
    <text x="980" y="497" text-anchor="middle" class="sublabel">OTLP gRPC + HTTP receivers</text>
    <text x="980" y="514" text-anchor="middle" class="sublabel">debug exporter + forward to jaeger</text>
    <text x="980" y="532" text-anchor="middle" class="badge">receives spans from toolbox, langgraph, trace-client</text>

    <rect x="820" y="580" width="320" height="80" rx="6" class="box box-obs"/>
    <text x="980" y="606" text-anchor="middle" class="label">jaeger :16686</text>
    <text x="980" y="622" text-anchor="middle" class="sublabel">all-in-one (OTLP-native receiver)</text>
    <text x="980" y="638" text-anchor="middle" class="sublabel">trace search + flame graph UI</text>

    <!-- ==== Cube — open-source semantic layer (Cube Core, Apache
         2.0). Runs as a sidecar; its YAML definitions back BI tools
         (REST/SQL APIs on :4000/:15432) AND are the source of truth
         for the cube_* Toolbox tools (manually-synced SQL). One
         model, two surfaces. See README "Semantic-layer integration
         with Cube" and NOTES.md for the postgres_scanner ↔ Cube
         compatibility writeup. ==== -->
    <rect x="820" y="678" width="320" height="107" rx="6" class="box" stroke="#805ad5"/>
    <text x="980" y="702" text-anchor="middle" class="label">cube :4000 · :15432  (Cube Core)</text>
    <text x="980" y="719" text-anchor="middle" class="sublabel">open-source semantic layer (Apache 2.0)</text>
    <text x="980" y="735" text-anchor="middle" class="sublabel">DuckDB driver · seeded from same seed.sql</text>
    <text x="980" y="751" text-anchor="middle" class="sublabel">REST/GraphQL :4000 · SQL API :15432</text>
    <text x="980" y="767" text-anchor="middle" class="sublabel">cube/model/cubes/{sales,orders}.yml</text>
    <text x="980" y="781" text-anchor="middle" class="badge">model authority · BI surface · cube_* Toolbox tools</text>
  </g>

  <!-- ====================== ARROWS ====================== -->

  <!-- Host → Docker arrows: long curves that bypass the profile-client row
       (they enter Toolbox / jaeger / inspector directly). Labels sit in the
       narrow band between the host panel (ends at y=238) and the docker
       panel title (starts at y=286). -->

  <!-- Host: Claude Code → Toolbox /mcp. Route through the gap between
       trace-client (ends x=280) and langgraph (starts x=310). -->
  <path d="M 180,210 C 295,260 295,420 295,450" class="arrow a-blue" marker-end="url(#arr-blue)"/>
  <rect x="160" y="244" width="160" height="18" class="arrow-label-bg"/>
  <text x="240" y="258" text-anchor="middle" class="arrow-label" fill="#2c5282">:5555 → :5000 /mcp</text>

  <!-- Host: curl/notebook → Toolbox /api. Route through the gap between
       langgraph (ends x=510) and inspector (starts x=540). -->
  <path d="M 410,210 C 525,260 525,420 525,450" class="arrow a-teal" marker-end="url(#arr-teal)"/>
  <rect x="455" y="244" width="160" height="18" class="arrow-label-bg"/>
  <text x="535" y="258" text-anchor="middle" class="arrow-label" fill="#2c7a7b">:5555 → :5000 /api/...</text>

  <!-- Host: Browser → Inspector UI (left pill → inspector container). -->
  <path d="M 645,210 C 645,250 660,275 660,312" class="arrow a-gray" marker-end="url(#arr-gray)"/>
  <rect x="600" y="244" width="100" height="18" class="arrow-label-bg"/>
  <text x="650" y="258" text-anchor="middle" class="arrow-label" fill="#4a5568">:6274 UI</text>

  <!-- Host: Browser → Toolbox UI (middle pill → Toolbox /ui). Same port
       as the MCP/REST traffic, just a different path; render as a UI
       arrow (dashed gray) to keep it visually distinct from the agent's
       /mcp call. -->
  <path d="M 830,210 C 830,300 800,400 760,450" class="arrow a-gray" marker-end="url(#arr-gray)"/>
  <rect x="775" y="244" width="120" height="18" class="arrow-label-bg"/>
  <text x="835" y="258" text-anchor="middle" class="arrow-label" fill="#4a5568">:5555/ui</text>

  <!-- Host: Browser → Jaeger UI (right pill → jaeger). Curves out to the
       right of the docker panel to clear the otel-collector box. -->
  <path d="M 1015,210 C 1100,260 1160,440 1140,580" class="arrow a-gray" marker-end="url(#arr-gray)"/>
  <rect x="1085" y="244" width="80" height="18" class="arrow-label-bg"/>
  <text x="1125" y="258" text-anchor="middle" class="arrow-label" fill="#4a5568">:16686</text>

  <!-- In-network: clients → Toolbox /mcp -->
  <path d="M 180,404 L 220,450" class="arrow a-blue" marker-end="url(#arr-blue)"/>
  <path d="M 410,404 L 410,450" class="arrow a-blue" marker-end="url(#arr-blue)"/>
  <path d="M 660,404 L 620,450" class="arrow a-blue" marker-end="url(#arr-blue)"/>
  <rect x="350" y="416" width="120" height="18" class="arrow-label-bg"/>
  <text x="410" y="430" text-anchor="middle" class="arrow-label" fill="#2c5282">toolbox:5000/mcp</text>

  <!-- Toolbox (in-process DuckDB) → each quack-server. Two separate
       sources in tools.yaml, each with its own ATTACH. -->
  <path d="M 250,620 L 250,675" class="arrow a-orange" marker-end="url(#arr-orange)"/>
  <rect x="175" y="635" width="150" height="18" class="arrow-label-bg"/>
  <text x="250" y="649" text-anchor="middle" class="arrow-label" fill="#c05621">ATTACH (sales-quack)</text>

  <path d="M 610,620 L 610,675" class="arrow a-orange" marker-end="url(#arr-orange)"/>
  <rect x="525" y="635" width="170" height="18" class="arrow-label-bg"/>
  <text x="610" y="649" text-anchor="middle" class="arrow-label" fill="#c05621">ATTACH (inventory-quack)</text>

  <!-- combined-analytics multi-attach: one source ATTACHes both Quack
       servers into the same in-process DuckDB so a single SQL can join
       across catalogs. Two thin dashed-orange arrows from a shared
       origin between the two solid ATTACH arrows. -->
  <path d="M 430,620 C 400,640 330,662 320,675" class="arrow a-orange-dash" stroke-width="1.2" marker-end="url(#arr-orange)"/>
  <path d="M 430,620 C 460,640 530,662 540,675" class="arrow a-orange-dash" stroke-width="1.2" marker-end="url(#arr-orange)"/>
  <rect x="338" y="660" width="184" height="16" class="arrow-label-bg"/>
  <text x="430" y="672" text-anchor="middle" class="arrow-label" fill="#c05621">combined-analytics · multi-attach</text>

  <!-- Cube → Toolbox: dashed-purple "model sync" arrow that represents
       the conceptual relationship between Cube's YAML definitions and
       the cube_* Toolbox tools' SQL. Today the sync is by hand
       (see README "Semantic-layer integration with Cube"); the arrow
       is a placeholder for the runtime-federation path that
       postgres_scanner cannot supply yet (NOTES.md). -->
  <path d="M 840,678 C 820,640 800,620 780,605" class="arrow a-purple-dash" stroke-width="1.4" marker-end="url(#arr-purple)"/>
  <rect x="780" y="650" width="120" height="16" class="arrow-label-bg"/>
  <text x="840" y="662" text-anchor="middle" class="arrow-label" fill="#805ad5">manual SQL sync</text>

  <!-- Toolbox → otel-collector (OTLP) -->
  <path d="M 780,496 L 820,496" class="arrow a-green" marker-end="url(#arr-green)"/>
  <rect x="780" y="478" width="42" height="16" class="arrow-label-bg"/>
  <text x="801" y="490" text-anchor="middle" class="arrow-label" fill="#276749">OTLP</text>

  <!-- otel-collector → jaeger (OTLP forward) -->
  <path d="M 980,542 L 980,580" class="arrow a-green" marker-end="url(#arr-green)"/>
  <rect x="950" y="552" width="62" height="16" class="arrow-label-bg"/>
  <text x="981" y="564" text-anchor="middle" class="arrow-label" fill="#276749">OTLP fwd</text>

  <!-- ====================== LEGEND ====================== -->
  <g transform="translate(40, 845)">
    <text x="0" y="0" font-size="11" font-weight="600" fill="#4a5568">Legend:</text>

    <line x1="60"  y1="-4" x2="100" y2="-4" stroke="#2c5282" stroke-width="1.6"/>
    <text x="106" y="0" font-size="11" fill="#4a5568">MCP JSON-RPC</text>

    <line x1="208" y1="-4" x2="248" y2="-4" stroke="#2c7a7b" stroke-width="1.6"/>
    <text x="254" y="0" font-size="11" fill="#4a5568">HTTP /api</text>

    <line x1="328" y1="-4" x2="368" y2="-4" stroke="#c05621" stroke-width="1.6"/>
    <text x="374" y="0" font-size="11" fill="#4a5568">ATTACH (one per source)</text>

    <line x1="510" y1="-4" x2="550" y2="-4" stroke="#c05621" stroke-width="1.2" stroke-dasharray="5 3"/>
    <text x="556" y="0" font-size="11" fill="#4a5568">multi-attach (one source, both servers)</text>

    <line x1="776" y1="-4" x2="816" y2="-4" stroke="#276749" stroke-width="1.6" stroke-dasharray="5 3"/>
    <text x="822" y="0" font-size="11" fill="#4a5568">OTLP</text>

    <line x1="858" y1="-4" x2="898" y2="-4" stroke="#718096" stroke-width="1.6" stroke-dasharray="3 2"/>
    <text x="904" y="0" font-size="11" fill="#4a5568">Browser → web UI</text>

    <line x1="1010" y1="-4" x2="1050" y2="-4" stroke="#805ad5" stroke-width="1.4" stroke-dasharray="5 3"/>
    <text x="1056" y="0" font-size="11" fill="#4a5568">semantic-model sync (Cube)</text>
  </g>
</svg>
