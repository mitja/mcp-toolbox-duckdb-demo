# MCP Toolbox configuration for the DuckDB/Quack demo.
#
# The top-level `sources:` / `tools:` / `toolsets:` maps use the map key as
# each entry's name and infer the kind from the parent. Do not also include
# `kind:` or `name:` inside the entry — Toolbox rejects the duplicate.

sources:
  sales-quack:
    type: duckdb-quack
    uri: quack:quack-server:9494         # service name "quack-server" on docker network
                                         # (the hostname "quack" alone trips a parser
                                         # bug in Quack — same name as the scheme).
    token: ${QUACK_TOKEN}
    disable_ssl: true
    attach_alias: remote
    policy:
      read_only: true
      reject_multiple_statements: true
      max_rows: 1000
      timeout: 30s

  # Second Quack server, separate container (quack-server-2). Exercises
  # multi-source routing: tools wired here ATTACH to a different remote
  # DuckDB process from the sales-quack tools above. Used by the
  # concurrent-load test in trace-client/concurrent.py.
  inventory-quack:
    type: duckdb-quack
    uri: quack:quack-server-2:9494
    token: ${QUACK_TOKEN}
    disable_ssl: true
    attach_alias: inventory_remote
    policy:
      read_only: true
      reject_multiple_statements: true
      max_rows: 1000
      timeout: 30s

  # Multi-attach source: one in-process DuckDB with BOTH Quack servers
  # ATTACHed. Tools wired here can write a single SQL that references
  # both remote catalogs in the same query — DuckDB pulls rows from
  # each remote and executes the JOIN locally. This is the "expensive"
  # path for the in-process DuckDB; the single-source tools above are
  # the cheap path where work pushes down to one remote.
  combined-analytics:
    type: duckdb-quack
    uri: quack:quack-server:9494
    token: ${QUACK_TOKEN}
    disable_ssl: true
    attach_alias: sales_remote
    additional_attachments:
      - uri: quack:quack-server-2:9494
        attach_alias: inventory_remote
    policy:
      read_only: true
      reject_multiple_statements: true
      max_rows: 1000
      timeout: 30s

tools:
  revenue_by_customer:
    type: duckdb-sql
    source: sales-quack
    description: >-
      Return revenue and order-count for customers whose name matches a
      case-insensitive pattern. The pattern is a plain substring; do not
      include SQL wildcards yourself. Read-only and limited to the sales
      mart.
    parameters:
      - name: customer_pattern
        type: string
        description: Case-insensitive customer name substring (no wildcards).
    statement: |
      SELECT
        customer,
        SUM(amount) AS revenue,
        COUNT(*)    AS orders
      FROM remote.sales
      WHERE customer ILIKE '%' || ? || '%'
      GROUP BY customer
      ORDER BY revenue DESC

  top_products:
    type: duckdb-sql
    source: sales-quack
    description: >-
      List the top products by total quantity sold across all orders.
      Read-only and limited to the sales mart.
    parameters: []
    statement: |
      SELECT
        product,
        SUM(qty) AS total_qty,
        COUNT(DISTINCT customer) AS customer_count
      FROM remote.orders
      GROUP BY product
      ORDER BY total_qty DESC

  # ---------------------------------------------------------------
  # Inventory tools — wired to the second source (inventory-quack /
  # quack-server-2). Used by the multi-source concurrent test in
  # trace-client/concurrent.py.
  # ---------------------------------------------------------------

  low_stock_items:
    type: duckdb-sql
    source: inventory-quack
    description: >-
      List products whose current stock has fallen at or below their
      reorder threshold. Read-only; reads from a separate Quack server
      than the sales tools above.
    parameters: []
    statement: |
      SELECT
        category,
        name,
        stock_qty,
        reorder_at,
        unit_price
      FROM inventory_remote.products
      WHERE stock_qty <= reorder_at
      ORDER BY (stock_qty * 1.0 / reorder_at), category, name

  inventory_summary:
    type: duckdb-sql
    source: inventory-quack
    description: >-
      Per-category totals: number of distinct products, total units in
      stock, average unit price.
    parameters: []
    statement: |
      SELECT
        category,
        COUNT(*)                  AS sku_count,
        SUM(stock_qty)            AS total_units,
        ROUND(AVG(unit_price), 2) AS avg_unit_price
      FROM inventory_remote.products
      GROUP BY category
      ORDER BY total_units DESC

  # ---------------------------------------------------------------
  # Parquet-backed reference data. The remote DuckDB on
  # quack-server-2 exposes /data/product_price_history.parquet as a
  # view in `main` (see quack-server/seed-inventory.sql), so the
  # Toolbox-side in-process DuckDB sees it through the existing
  # ATTACH as inventory_remote.product_price_history. The whole
  # read_parquet call runs on the remote side; only the result rows
  # cross the wire. Validates the "server-side federation" pattern
  # from NOTES.md against a non-DuckDB-table source.
  # ---------------------------------------------------------------

  price_history_for_product:
    type: duckdb-sql
    source: inventory-quack
    description: >-
      Return the full price history (validity windows + change reason)
      for one product. The pattern is a plain case-insensitive
      substring; do not include SQL wildcards yourself. Rows are
      backed by a parquet file mounted next to the remote DuckDB.
    parameters:
      - name: product_pattern
        type: string
        description: Case-insensitive product name substring (no wildcards).
    statement: |
      SELECT
        product_name,
        valid_from,
        valid_to,
        unit_price,
        change_reason
      FROM inventory_remote.product_price_history
      WHERE product_name ILIKE '%' || ? || '%'
      ORDER BY product_name, valid_from

  current_prices:
    type: duckdb-sql
    source: inventory-quack
    description: >-
      Join the products table with the current (open-ended) row in
      product_price_history so each SKU is paired with its active
      price plus the date the current price went into effect.
      Demonstrates a join between a normal table and a parquet-backed
      view, both on the same remote Quack server.
    parameters: []
    # push_down_to_remote routes the entire statement to the remote
    # via quack_query() so the join executes next to the parquet file
    # and only the result rows stream back as a single scan. Without
    # the flag, the Toolbox-side planner sees two ATTACHed-table
    # references in one plan and DuckDB rejects with "Multiple
    # streaming scans … not currently supported". (Implemented in
    # the duckdb-quack adapter — see NOTES.md for the longer writeup.)
    push_down_to_remote: true
    statement: |
      SELECT
        p.category,
        p.name              AS product_name,
        h.unit_price        AS current_price,
        h.valid_from        AS price_since,
        h.change_reason     AS last_change_reason,
        p.stock_qty
      FROM products p
      LEFT JOIN product_price_history h
        ON h.product_name = p.name AND h.valid_to IS NULL
      ORDER BY p.category, p.name

  # ---------------------------------------------------------------
  # Cross-catalog tool wired to combined-analytics. The in-process
  # DuckDB has BOTH Quack servers ATTACHed, so this JOIN combines
  # rows from sales-quack.orders and inventory-quack.products in
  # one query. The join is executed by the local DuckDB after rows
  # stream back from each remote — the canonical example of the
  # "data does cross the wire" path described in the README's
  # pushdown tips.
  # ---------------------------------------------------------------

  product_orders_overview:
    type: duckdb-sql
    source: combined-analytics
    description: >-
      For each product in the inventory catalog, show its stock
      situation plus the total quantity ordered across all sales.
      Joins inventory_remote.products with sales_remote.orders on
      product name. Read-only.
    parameters: []
    statement: |
      SELECT
        p.category,
        p.name,
        p.stock_qty,
        p.reorder_at,
        COALESCE(SUM(o.qty), 0) AS units_ordered,
        COUNT(DISTINCT o.customer) AS distinct_customers
      FROM inventory_remote.products p
      LEFT JOIN sales_remote.orders o ON o.product = p.name
      GROUP BY p.category, p.name, p.stock_qty, p.reorder_at
      ORDER BY units_ordered DESC, p.name

  # ---------------------------------------------------------------
  # Metadata tools — let an agent discover the catalog before
  # writing a query. Each tool has a fixed scope baked into this
  # file; the agent supplies no parameters.
  # ---------------------------------------------------------------

  list_catalogs:
    type: duckdb-list-catalogs
    source: sales-quack
    description: >-
      List the catalogs the Toolbox-side DuckDB can see. Useful as the
      first call when an agent is exploring an unfamiliar deployment.

  list_remote_schemas:
    type: duckdb-list-schemas
    source: sales-quack
    description: >-
      List the schemas in the remote DuckDB's current database.

  list_remote_tables:
    type: duckdb-list-tables
    source: sales-quack
    description: >-
      List the base tables and views in the remote `main` schema. The
      result is a row per table with name and table_type.
    schema: main
    include_tables: true
    include_views: true

  describe_sales:
    type: duckdb-describe-table
    source: sales-quack
    description: >-
      Return the column names, types, and nullability of the
      remote.main.sales table.
    schema: main
    table: sales

  describe_orders:
    type: duckdb-describe-table
    source: sales-quack
    description: >-
      Return the column names, types, and nullability of the
      remote.main.orders table.
    schema: main
    table: orders

  summarize_sales:
    type: duckdb-summarize-table
    source: sales-quack
    description: >-
      Per-column statistics for remote.main.sales (min, max, avg, std,
      quartiles, distinct counts, null percentages).
    schema: main
    table: sales

  # ---------------------------------------------------------------
  # Development tool — accepts an agent-supplied SQL string. Gated
  # behind `enabled: true` and not part of any production toolset.
  # Toolbox refuses to start if `enabled` is missing or false; with
  # `enabled: true` it logs a WARN line on every boot. Per spec §3,
  # this tool is NOT intended for production agents. The same
  # statement validator that duckdb-sql runs at config-load is
  # applied here at every invocation, so destructive verbs are
  # rejected before they reach the database — but that's defense
  # in depth, not a SQL sandbox.
  # ---------------------------------------------------------------
  dev_duckdb_execute_sql:
    type: duckdb-execute-sql
    source: sales-quack
    description: >-
      Run an arbitrary read-only SQL statement against the analytics
      catalog. Development and human-in-the-loop debugging only.
    enabled: true

toolsets:
  # Query-oriented tools an agent uses to answer questions.
  analytics_readonly:
    - revenue_by_customer
    - top_products

  # Discovery tools an agent uses to learn the catalog before
  # constructing a query. Loaded as a separate toolset so a deployment
  # can choose to expose just the queries (analytics_readonly), just
  # the metadata (analytics_metadata), or both.
  analytics_metadata:
    - list_catalogs
    - list_remote_schemas
    - list_remote_tables
    - describe_sales
    - describe_orders
    - summarize_sales

  # Development-only toolset. Loaded explicitly by a human operator's
  # MCP client; never exposed to a production agent.
  analytics_dev:
    - dev_duckdb_execute_sql

  # Inventory tools wired to the second source. Loaded by the
  # concurrent-load test (trace-client/concurrent.py) alongside the
  # analytics_readonly tools to exercise multi-source routing under
  # parallel requests.
  inventory_readonly:
    - low_stock_items
    - inventory_summary
    - price_history_for_product
    - current_prices

  # Cross-catalog tools: the in-process DuckDB ATTACHes both Quack
  # servers and executes the JOIN locally after rows stream from each.
  cross_catalog:
    - product_orders_overview
