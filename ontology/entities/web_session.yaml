# Business entity: web_session. See customer.yaml for the authoring rules.
entity: web_session
description: >-
  A browser session on the marketing site, identified by session_id
  in the raw web-events stream. The engineered warehouse (dlt + dbt
  + Dagster) rolls sessions up into daily traffic and page
  leaderboards.
synonyms: [session, visit]
owner: marketing
caveats:
  - Web events are synthetic demo data regenerated by the pipeline;
    counts change between Dagster materializations.
