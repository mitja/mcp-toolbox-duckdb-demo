# OpenTelemetry Collector config for the demo. Accepts OTLP traces and
# metrics on both gRPC (4317) and HTTP (4318), batches them, and renders
# them to stdout via the debug exporter so `docker compose logs
# otel-collector` shows the spans and metric points the toolbox emits.
#
# Traces additionally fan out to Jaeger (UI on :16686); metrics fan out
# to a Prometheus scrape endpoint on :8889, consumed by the
# prometheus + grafana services in the `obs` Compose profile.
#
# To send to a different backend (Tempo, Grafana Cloud, Honeycomb,
# Datadog, …), add it under `exporters:` and reference it in the pipeline
# `exporters:` list. The debug exporter can stay alongside for local
# tail-the-logs inspection.

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 1s
    send_batch_size: 64

exporters:
  # Tail-the-logs view for the demo. Keep this on alongside any "real"
  # exporter so `docker compose logs otel-collector` stays informative.
  debug:
    verbosity: detailed

  # Fan out traces to Jaeger all-in-one over OTLP. Jaeger v1.35+ accepts
  # OTLP natively when COLLECTOR_OTLP_ENABLED=true (set in docker-compose).
  otlphttp/jaeger:
    endpoint: http://jaeger:4318
    tls:
      insecure: true

  # Expose received metrics on a Prometheus scrape endpoint. The
  # prometheus service (Compose profile `obs`) scrapes this; without
  # that profile the endpoint is simply never scraped — harmless.
  prometheus:
    endpoint: 0.0.0.0:8889

extensions:
  # Liveness/readiness endpoint on :13133 (GET /). The collector image
  # is built FROM scratch (no shell), so Docker can't exec a healthcheck
  # inside it — but the CI smoke test and humans can curl this from the
  # host (the port is published in docker-compose.yaml).
  health_check:
    endpoint: 0.0.0.0:13133

service:
  extensions: [health_check]
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [debug, otlphttp/jaeger]
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [debug, prometheus]
