# Demo stack for the MCP Toolbox DuckDB / Quack adapter.
#
# Services:
#   - quack-server: a Debian image running the DuckDB CLI with the Quack
#               extension loaded, serving a small analytics dataset over
#               the Quack remote protocol on port 9494.
#   - toolbox:  the MCP Toolbox server built from the sibling
#               mcp-toolbox-duckdb fork (the feat/duckdb-quack branch).
#               Exposes the curated duckdb-sql tools at HTTP :5000.
#   - otel-collector: an OpenTelemetry collector that receives traces and
#               metrics from the toolbox and a trace-client, batches them,
#               and exports them to Jaeger (and stdout for easy local debugging).
#   - jaeger: the Jaeger all-in-one image, which receives OTLP from the
#               collector and serves the Jaeger UI on http://localhost:16686.
#
# Optional services, gated by Docker Compose profiles:
#   - inspector: the MCP Inspector, a web UI for exploring an MCP server's
#               tools/resources/prompts and invoking them interactively.
#   - trace-client: a tiny Go program that emits a test trace and makes one
#               HTTP call to the toolbox. Useful for verifying that the
#               OTLP instrumentation and Jaeger setup are working without
#               needing to trigger the agent-based demo below.
#   - langgraph: a tiny ReAct agent that loads the analytics_readonly
#                toolset and asks Claude to answer a sample question.
#
# Required env vars (see .env.example): QUACK_TOKEN, ANTHROPIC_API_KEY.
#
# An OTel collector sits beside the toolbox; the toolbox is configured
# with --telemetry-otlp http://otel-collector:4318 so all of its spans
# and metrics land there. The collector's debug exporter renders
# everything to stdout, so `docker compose logs otel-collector` is the
# observability view for the demo (replace the exporter with Tempo,
# Jaeger, or a SaaS backend for anything serious).

services:
  quack-server:
    build: ./quack-server
    container_name: duckdb-quack
    environment:
      QUACK_TOKEN: ${QUACK_TOKEN:?set QUACK_TOKEN in .env}
      QUACK_PORT: "9494"
    ports:
      - "9494:9494"
    healthcheck:
      test: ["CMD", "nc", "-z", "127.0.0.1", "9494"]
      interval: 2s
      timeout: 1s
      retries: 30

  # Second Quack server, same image, different seed mounted over the
  # baked-in /quack/seed.sql. Wired as the `inventory-quack` source in
  # tools.yaml. Exercises multi-source routing in Toolbox (each source
  # has its own in-process DuckDB + ATTACH) and is hammered alongside
  # sales-quack by the trace-load profile.
  #
  # No host port: the only thing that needs to reach it is Toolbox,
  # which uses the docker-network hostname `quack-server-2`.
  quack-server-2:
    build: ./quack-server
    container_name: duckdb-quack-2
    environment:
      QUACK_TOKEN: ${QUACK_TOKEN:?set QUACK_TOKEN in .env}
      QUACK_PORT: "9494"
    volumes:
      - ./quack-server/seed-inventory.sql:/quack/seed.sql:ro
      # Reference data exposed inside the remote DuckDB as a view over
      # read_parquet(...). Demonstrates the "server-side federation"
      # pattern: the remote does the read, the Toolbox-side in-process
      # DuckDB sees a normal view via ATTACH.
      - ./quack-server/product_price_history.parquet:/data/product_price_history.parquet:ro
    healthcheck:
      test: ["CMD", "nc", "-z", "127.0.0.1", "9494"]
      interval: 2s
      timeout: 1s
      retries: 30

  toolbox:
    # Override the upstream Dockerfile (which cross-compiles via Zig and
    # cannot resolve C++ stdlib symbols that the DuckDB-go static library
    # requires) with a native CGO build. golang:1 already ships gcc; we
    # add g++ for libstdc++. The runtime stage matches upstream
    # (distroless/cc supplies libc + libstdc++).
    build:
      context: ../mcp-toolbox-duckdb
      dockerfile_inline: |
        # Pin builder to bookworm so the linked glibc matches the
        # distroless/cc-debian12 runtime (golang:1's default debian
        # version drifts forward independently).
        FROM golang:1-bookworm AS build
        RUN apt-get update \
         && apt-get install -y --no-install-recommends g++ \
         && rm -rf /var/lib/apt/lists/*
        WORKDIR /src
        COPY . .
        ENV CGO_ENABLED=1
        RUN go build -o /toolbox .

        FROM gcr.io/distroless/cc-debian12:nonroot
        WORKDIR /app
        COPY --from=build --chown=nonroot /toolbox /toolbox
        USER nonroot
        ENTRYPOINT ["/toolbox"]
    container_name: toolbox-duckdb
    command:
      - "--config"
      - "/cfg/tools.yaml"
      - "--address"
      - "0.0.0.0"
      - "--enable-api"
      - "--ui"
      - "--log-level"
      - "DEBUG"
      # `--telemetry-otlp` wants a host:port, NOT a URL. Toolbox builds the
      # full `https://<host>/v1/{traces,metrics}` itself; passing `http://`
      # here yields a malformed URL ("https://http://…/v1/metrics").
      # For an in-cluster collector that does not terminate TLS, the
      # OTEL_EXPORTER_OTLP_INSECURE env var below tells Toolbox's OTLP
      # exporter to use plaintext HTTP.
      - "--telemetry-otlp"
      - "otel-collector:4318"
      - "--telemetry-service-name"
      - "duckdb-quack-demo"
    environment:
      QUACK_TOKEN: ${QUACK_TOKEN:?set QUACK_TOKEN in .env}
      # OTLP exporter knobs:
      #   - INSECURE=true:  the collector listens on plain HTTP inside
      #                     the docker network (no TLS terminator).
      #   - PROTOCOL=http/protobuf: Toolbox passes a host:port to the
      #                     SDK; the SDK's default protocol is gRPC, so
      #                     pin it to HTTP to match our 4318 endpoint.
      OTEL_EXPORTER_OTLP_INSECURE: "true"
      OTEL_EXPORTER_OTLP_PROTOCOL: "http/protobuf"
    volumes:
      - ./tools.yaml:/cfg/tools.yaml:ro
    ports:
      # Host 5555 → container 5000. macOS binds 5000 to AirPlay by default,
      # which intercepts the published port; pick a free host port.
      - "5555:5000"
    depends_on:
      quack-server:
        condition: service_healthy
      quack-server-2:
        condition: service_healthy
      otel-collector:
        condition: service_started

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.115.1
    container_name: otel-collector
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    volumes:
      - ./otel-collector/config.yaml:/etc/otelcol-contrib/config.yaml:ro
    ports:
      - "4317:4317" # OTLP gRPC
      - "4318:4318" # OTLP HTTP
    depends_on:
      - jaeger

  # Jaeger all-in-one: receives OTLP from the collector and serves the
  # web UI. Open http://localhost:16686 to inspect traces.
  jaeger:
    image: jaegertracing/all-in-one:1.62.0
    container_name: jaeger
    environment:
      # Jaeger v1.35+ ships native OTLP receivers; this env enables them.
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686" # Web UI
      # 4317/4318 are exposed inside the docker network only; the
      # collector talks to Jaeger over OTLP. Hostside OTLP stays
      # mapped to the otel-collector service above.

  # Tiny standalone client that emits an OTel trace + makes one HTTP
  # call to Toolbox. Demonstrates that the LangGraph -> MCP -> SQL
  # trace stitch works without needing an LLM API key. Profile-gated
  # so it does not start with `docker compose up`.
  trace-client:
    build: ./trace-client
    container_name: trace-client
    environment:
      TOOLBOX_URL: http://toolbox:5000
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
      OTEL_SERVICE_NAME: trace-client
    depends_on:
      - toolbox
    profiles: ["trace"]

  # Concurrent multi-source test. Reuses the trace-client image but
  # overrides the entrypoint to run load_test.py, which fires
  # N parallel MCP tools/call requests fanned out across both
  # source DBs (sales-quack + inventory-quack), then polls Jaeger
  # to verify every emitted trace landed AND each trace's span tree
  # is properly stitched. Exits non-zero on any failure, so it
  # doubles as a CI-style smoke test under concurrency.
  #
  # (Module is named load_test.py, not concurrent.py, because the
  # latter would shadow the stdlib `concurrent.futures` package.)
  trace-load:
    build: ./trace-client
    container_name: trace-load
    entrypoint: ["python", "load_test.py"]
    environment:
      TOOLBOX_URL: http://toolbox:5000
      JAEGER_URL: http://jaeger:16686
      N_CONCURRENT: ${N_CONCURRENT:-20}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
      OTEL_SERVICE_NAME: trace-load
    depends_on:
      - toolbox
      - jaeger
    profiles: ["load"]

  langgraph:
    build: ./langgraph
    container_name: langgraph-demo
    environment:
      TOOLBOX_URL: http://toolbox:5000
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:?set ANTHROPIC_API_KEY in .env}
      # OTel propagation: same collector as the toolbox-side stack.
      # With these set, the agent's outgoing HTTP calls auto-inject
      # W3C traceparent and the whole agent -> MCP -> SQL chain
      # renders as one trace in Jaeger.
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
      OTEL_SERVICE_NAME: langgraph-demo
    depends_on:
      - toolbox
    profiles: ["agent"]

  # MCP Inspector: a web UI for exploring an MCP server's
  # tools/resources/prompts and invoking them interactively. Useful
  # for sanity-checking the wire-level shape of what Toolbox
  # publishes at /mcp, independent of any agent or SDK.
  #
  # DANGEROUSLY_OMIT_AUTH disables the inspector's session-token
  # gate, which is fine for a localhost demo but not for anything
  # exposed beyond the loopback interface. Remove the env var (and
  # `docker compose logs inspector | grep token` for the generated
  # token) before binding to a non-loopback address.
  inspector:
    image: ghcr.io/modelcontextprotocol/inspector:0.21.2-hotfix-3
    container_name: mcp-inspector
    environment:
      HOST: "0.0.0.0"
      DANGEROUSLY_OMIT_AUTH: "true"
      MCP_AUTO_OPEN_ENABLED: "false"
    ports:
      - "6274:6274" # UI
      - "6277:6277" # proxy (UI -> proxy -> MCP server)
    depends_on:
      - toolbox
    profiles: ["inspect"]
