# Demo stack for the MCP Toolbox DuckDB / Quack adapter.
#
# Core services (plain `docker compose up`):
#   - quack-server: a Debian image running the DuckDB CLI with the Quack
#               extension loaded, serving a small analytics dataset over
#               the Quack remote protocol on port 9494.
#   - quack-server-2: same image, inventory seed — exercises multi-source
#               routing in Toolbox.
#   - toolbox:  the MCP Toolbox server built from the mcp-toolbox-duckdb
#               fork (the feat/duckdb-quack branch). Exposes the curated
#               duckdb-sql tools at HTTP :5000 (host :5555). The fork's
#               checkout location defaults to ../mcp-toolbox-duckdb;
#               override with TOOLBOX_SRC in .env or the environment.
#   - otel-collector: an OpenTelemetry collector that receives traces and
#               metrics from the toolbox and clients, batches them, and
#               exports traces to Jaeger, metrics to a Prometheus scrape
#               endpoint, and everything to stdout for local debugging.
#   - jaeger: the Jaeger all-in-one image, which receives OTLP from the
#               collector and serves the Jaeger UI on http://localhost:16686.
#
# Optional services, gated by Docker Compose profiles:
#   - inspect:  inspector — the MCP Inspector web UI.
#   - trace:    trace-client — emits one test trace through the stack.
#   - load:     trace-load — concurrent multi-source smoke test (also used
#               by the CI workflow).
#   - agent:    langgraph — a tiny ReAct agent that loads the
#               analytics_readonly toolset and asks Claude a question.
#   - bi:       cube-seed + cube + superset — the semantic-layer / BI
#               track. Heavy (~2 GB RAM); start with
#               `docker compose --profile bi up -d`.
#   - dataeng:  dagster + quack-server-3 — the dlt + dbt + Dagster
#               data-engineering track. Heavy; start with
#               `docker compose --profile dataeng up -d`. The
#               analytics-engineered Toolbox source has
#               attach_on_startup: false, so the core stack runs fine
#               without this profile — the engineered tools just error
#               until it's up.
#   - obs:      prometheus + grafana over the collector's metrics
#               endpoint, http://localhost:9090 / http://localhost:3001.
#
# Required env vars (see .env.example): QUACK_TOKEN_SALES,
# QUACK_TOKEN_INVENTORY, QUACK_TOKEN_ENGINEERED — one token per Quack
# server, mirroring per-source credential scoping in tools.yaml — and
# ANTHROPIC_API_KEY (agent profile only).
#
# An OTel collector sits beside the toolbox; the toolbox is configured
# with --telemetry-otlp otel-collector:4318 so all of its spans
# and metrics land there. The collector's debug exporter renders
# everything to stdout, so `docker compose logs otel-collector` is the
# quick observability view for the demo.
#
# Container names: intentionally NOT pinned via container_name. Compose
# derives <project>-<service>-N from the `name:` below, so two checkouts
# can run side by side and `docker compose exec <service> …` always
# works. Use service names in commands, not raw container names.

name: mcp-toolbox-duckdb-demo

services:
  quack-server:
    build: ./quack-server
    environment:
      QUACK_TOKEN: ${QUACK_TOKEN_SALES:?set QUACK_TOKEN_SALES in .env}
      QUACK_PORT: "9494"
    ports:
      - "9494:9494"
    healthcheck:
      test: ["CMD", "nc", "-z", "127.0.0.1", "9494"]
      interval: 2s
      timeout: 1s
      retries: 30
    deploy:
      resources:
        limits:
          memory: 1g

  # Second Quack server, same image, different seed mounted over the
  # baked-in /quack/seed.sql. Wired as the `inventory-quack` source in
  # tools.yaml. Exercises multi-source routing in Toolbox (each source
  # has its own in-process DuckDB + ATTACH) and is hammered alongside
  # sales-quack by the trace-load profile.
  #
  # No host port: the only thing that needs to reach it is Toolbox,
  # which uses the docker-network hostname `quack-server-2`.
  quack-server-2:
    build: ./quack-server
    environment:
      QUACK_TOKEN: ${QUACK_TOKEN_INVENTORY:?set QUACK_TOKEN_INVENTORY in .env}
      QUACK_PORT: "9494"
    volumes:
      - ./quack-server/seed-inventory.sql:/quack/seed.sql:ro
      # Reference data exposed inside the remote DuckDB as a view over
      # read_parquet(...). Demonstrates the "server-side federation"
      # pattern: the remote does the read, the Toolbox-side in-process
      # DuckDB sees a normal view via ATTACH.
      - ./quack-server/product_price_history.parquet:/data/product_price_history.parquet:ro
    healthcheck:
      test: ["CMD", "nc", "-z", "127.0.0.1", "9494"]
      interval: 2s
      timeout: 1s
      retries: 30
    deploy:
      resources:
        limits:
          memory: 1g

  toolbox:
    # Override the upstream Dockerfile (which cross-compiles via Zig and
    # cannot resolve C++ stdlib symbols that the DuckDB-go static library
    # requires) with a native CGO build. golang already ships gcc; we
    # add g++ for libstdc++. The runtime stage matches upstream
    # (distroless/cc supplies libc + libstdc++).
    #
    # TOOLBOX_SRC points at a checkout of
    # https://github.com/mitja/mcp-toolbox-duckdb (branch
    # feat/duckdb-quack); defaults to a sibling directory:
    #   git clone -b feat/duckdb-quack https://github.com/mitja/mcp-toolbox-duckdb ../mcp-toolbox-duckdb
    build:
      context: ${TOOLBOX_SRC:-../mcp-toolbox-duckdb}
      dockerfile_inline: |
        # Builder pinned to bookworm so the linked glibc matches the
        # distroless/cc-debian12 runtime (golang's default debian
        # version drifts forward independently — it's trixie now).
        FROM golang:1.26.4-bookworm AS build
        RUN apt-get update \
         && apt-get install -y --no-install-recommends g++ \
         && rm -rf /var/lib/apt/lists/*
        WORKDIR /src
        COPY . .
        ENV CGO_ENABLED=1
        RUN go build -o /toolbox .

        # Tiny static healthcheck binary. distroless/cc has no shell, so
        # Docker's HEALTHCHECK needs a standalone executable. GET / on
        # the toolbox returns 200 once config + sources are loaded
        # (sources ATTACH eagerly during startup), so a 200 here means
        # "ready", not just "listening".
        FROM golang:1.26.4-bookworm AS healthcheck
        WORKDIR /hc
        COPY <<'EOF' main.go
        package main

        import (
            "net/http"
            "os"
            "time"
        )

        func main() {
            client := &http.Client{Timeout: 2 * time.Second}
            resp, err := client.Get("http://127.0.0.1:5000/")
            if err != nil || resp.StatusCode != http.StatusOK {
                os.Exit(1)
            }
        }
        EOF
        RUN go mod init healthcheck && CGO_ENABLED=0 go build -o /healthcheck .

        FROM gcr.io/distroless/cc-debian12:nonroot
        WORKDIR /app
        COPY --from=build --chown=nonroot /toolbox /toolbox
        COPY --from=healthcheck --chown=nonroot /healthcheck /healthcheck
        USER nonroot
        ENTRYPOINT ["/toolbox"]
    command:
      - "--config"
      - "/cfg/tools.yaml"
      - "--address"
      - "0.0.0.0"
      - "--enable-api"
      - "--ui"
      - "--log-level"
      - "DEBUG"
      # `--telemetry-otlp` wants a host:port, NOT a URL. Toolbox builds the
      # full `https://<host>/v1/{traces,metrics}` itself; passing `http://`
      # here yields a malformed URL ("https://http://…/v1/metrics").
      # For an in-cluster collector that does not terminate TLS, the
      # OTEL_EXPORTER_OTLP_INSECURE env var below tells Toolbox's OTLP
      # exporter to use plaintext HTTP.
      - "--telemetry-otlp"
      - "otel-collector:4318"
      - "--telemetry-service-name"
      - "duckdb-quack-demo"
    environment:
      # Per-server tokens, expanded by tools.yaml's ${...} references.
      # All three must be set even when the dataeng profile is down —
      # Toolbox expands env vars at config load, before any connection.
      QUACK_TOKEN_SALES: ${QUACK_TOKEN_SALES:?set QUACK_TOKEN_SALES in .env}
      QUACK_TOKEN_INVENTORY: ${QUACK_TOKEN_INVENTORY:?set QUACK_TOKEN_INVENTORY in .env}
      QUACK_TOKEN_ENGINEERED: ${QUACK_TOKEN_ENGINEERED:?set QUACK_TOKEN_ENGINEERED in .env}
      # OTLP exporter knobs:
      #   - INSECURE=true:  the collector listens on plain HTTP inside
      #                     the docker network (no TLS terminator).
      #   - PROTOCOL=http/protobuf: Toolbox passes a host:port to the
      #                     SDK; the SDK's default protocol is gRPC, so
      #                     pin it to HTTP to match our 4318 endpoint.
      OTEL_EXPORTER_OTLP_INSECURE: "true"
      OTEL_EXPORTER_OTLP_PROTOCOL: "http/protobuf"
    volumes:
      - ./tools.yaml:/cfg/tools.yaml:ro
    ports:
      # Host 5555 → container 5000. macOS binds 5000 to AirPlay by default,
      # which intercepts the published port; pick a free host port.
      - "5555:5000"
    healthcheck:
      test: ["CMD", "/healthcheck"]
      interval: 2s
      timeout: 3s
      retries: 30
      # Startup runs INSTALL/LOAD of the Quack extension plus the eager
      # ATTACHes to both core Quack servers; allow some slack.
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1g
    depends_on:
      quack-server:
        condition: service_healthy
      quack-server-2:
        condition: service_healthy
      otel-collector:
        condition: service_started

  otel-collector:
    # Core (not -contrib) distribution: everything this config uses
    # (otlp receiver, batch, debug/otlphttp/prometheus exporters,
    # health_check extension) ships in core, and the image is smaller.
    image: otel/opentelemetry-collector:0.153.0
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./otel-collector/config.yaml:/etc/otelcol/config.yaml:ro
    ports:
      - "4317:4317" # OTLP gRPC
      - "4318:4318" # OTLP HTTP
      # health_check extension. The collector image is FROM scratch (no
      # shell), so Docker can't run an in-container healthcheck — but
      # the CI smoke test and humans can `curl localhost:13133` from
      # the host. In-network OTLP clients retry, so startup ordering
      # against the collector is soft anyway.
      - "13133:13133"
    deploy:
      resources:
        limits:
          memory: 512m
    depends_on:
      - jaeger

  # Jaeger all-in-one: receives OTLP from the collector and serves the
  # web UI. Open http://localhost:16686 to inspect traces.
  jaeger:
    image: jaegertracing/all-in-one:1.62.0
    environment:
      # Jaeger v1.35+ ships native OTLP receivers; this env enables them.
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686" # Web UI
      # 4317/4318 are exposed inside the docker network only; the
      # collector talks to Jaeger over OTLP. Hostside OTLP stays
      # mapped to the otel-collector service above.
    deploy:
      resources:
        limits:
          memory: 1g

  # ---------------------------------------------------------------
  # Observability extras — profile `obs`. Prometheus scrapes the
  # collector's :8889 metrics endpoint; Grafana (admin/admin) comes
  # provisioned with Prometheus as its default datasource.
  # ---------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v3.12.0
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    deploy:
      resources:
        limits:
          memory: 512m
    depends_on:
      - otel-collector
    profiles: ["obs"]

  grafana:
    image: grafana/grafana:12.4.4
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    ports:
      # Host 3001 — Dagster owns 3000.
      - "3001:3000"
    deploy:
      resources:
        limits:
          memory: 512m
    depends_on:
      - prometheus
    profiles: ["obs"]

  # Tiny standalone client that emits an OTel trace + makes one HTTP
  # call to Toolbox. Demonstrates that the LangGraph -> MCP -> SQL
  # trace stitch works without needing an LLM API key. Profile-gated
  # so it does not start with `docker compose up`.
  trace-client:
    build: ./trace-client
    environment:
      TOOLBOX_URL: http://toolbox:5000
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
      OTEL_SERVICE_NAME: trace-client
    depends_on:
      toolbox:
        condition: service_healthy
    profiles: ["trace"]

  # Concurrent multi-source test. Reuses the trace-client image but
  # overrides the entrypoint to run load_test.py, which fires
  # N parallel MCP tools/call requests fanned out across both
  # source DBs (sales-quack + inventory-quack), then polls Jaeger
  # to verify every emitted trace landed AND each trace's span tree
  # is properly stitched. Exits non-zero on any failure, so it
  # doubles as the CI smoke test under concurrency (see
  # .github/workflows/smoke.yml).
  #
  # (Module is named load_test.py, not concurrent.py, because the
  # latter would shadow the stdlib `concurrent.futures` package.)
  trace-load:
    build: ./trace-client
    entrypoint: ["python", "load_test.py"]
    environment:
      TOOLBOX_URL: http://toolbox:5000
      JAEGER_URL: http://jaeger:16686
      N_CONCURRENT: ${N_CONCURRENT:-20}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
      OTEL_SERVICE_NAME: trace-load
    depends_on:
      toolbox:
        condition: service_healthy
      jaeger:
        condition: service_started
    profiles: ["load"]

  langgraph:
    build: ./langgraph
    environment:
      TOOLBOX_URL: http://toolbox:5000
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:?set ANTHROPIC_API_KEY in .env}
      # OTel propagation: same collector as the toolbox-side stack.
      # With these set, the agent's outgoing HTTP calls auto-inject
      # W3C traceparent and the whole agent -> MCP -> SQL chain
      # renders as one trace in Jaeger.
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
      OTEL_SERVICE_NAME: langgraph-demo
    depends_on:
      toolbox:
        condition: service_healthy
    profiles: ["agent"]

  # MCP Inspector: a web UI for exploring an MCP server's
  # tools/resources/prompts and invoking them interactively. Useful
  # for sanity-checking the wire-level shape of what Toolbox
  # publishes at /mcp, independent of any agent or SDK.
  #
  # DANGEROUSLY_OMIT_AUTH disables the inspector's session-token
  # gate, which is fine for a localhost demo but not for anything
  # exposed beyond the loopback interface. Remove the env var (and
  # `docker compose logs inspector | grep token` for the generated
  # token) before binding to a non-loopback address.
  inspector:
    image: ghcr.io/modelcontextprotocol/inspector:0.21.2-hotfix-3
    environment:
      HOST: "0.0.0.0"
      DANGEROUSLY_OMIT_AUTH: "true"
      MCP_AUTO_OPEN_ENABLED: "false"
    ports:
      - "6274:6274" # UI
      - "6277:6277" # proxy (UI -> proxy -> MCP server)
    deploy:
      resources:
        limits:
          memory: 512m
    depends_on:
      toolbox:
        condition: service_healthy
    profiles: ["inspect"]

  # ---------------------------------------------------------------
  # Cube — open-source semantic layer (Cube Core, Apache 2.0).
  # Profile `bi` together with cube-seed and superset.
  #
  # The conceptual story: in real deployments BI tools (Superset,
  # Tableau, ...) hit Cube for measures + dimensions, and the same
  # semantic model also backs the agent surface — one model, two
  # surfaces. To make that concrete here, Cube runs as a sidecar
  # over a small DuckDB seeded from the same seed.sql used by the
  # primary quack-server, defines two cubes (sales, orders) over the
  # warehouse tables, exposes a Postgres-protocol SQL API on :15432,
  # and the primary Quack server ATTACHes Cube's SQL API via the
  # duckdb postgres extension. Cube-derived views in main are then
  # visible to the Toolbox-side ATTACH like any other table — no
  # adapter changes (the "server-side federation" pattern from
  # NOTES.md applied to a semantic layer instead of a raw backend).
  # ---------------------------------------------------------------

  # cube-seed: one-shot init container. Reuses the quack-server
  # image (which already has the duckdb CLI installed) to create a
  # DuckDB file populated from the same seed.sql the primary
  # quack-server uses. Cube reads this file via its DuckDB driver.
  # Compose waits for service_completed_successfully before starting
  # Cube, so the file is always present when Cube boots.
  cube-seed:
    build: ./quack-server
    entrypoint: ["sh", "-c"]
    command:
      - |
        set -eu
        if [ -f /cube-data/sales.duckdb ]; then
          echo "cube-seed: /cube-data/sales.duckdb already exists, skipping"
          exit 0
        fi
        echo "cube-seed: creating /cube-data/sales.duckdb from /seed.sql"
        duckdb /cube-data/sales.duckdb < /seed.sql
        echo "cube-seed: done"
    volumes:
      - cube-data:/cube-data
      - ./quack-server/seed.sql:/seed.sql:ro
    profiles: ["bi"]

  cube:
    # Pinned to a v1.3 patch release (was v1.3, a moving minor tag).
    image: cubejs/cube:v1.3.86
    environment:
      CUBEJS_DEV_MODE: "true"
      CUBEJS_SCHEMA_PATH: model
      CUBEJS_DB_TYPE: duckdb
      CUBEJS_DB_DUCKDB_DATABASE_PATH: /cube-data/sales.duckdb
      # SQL API config — Postgres protocol on :15432. The primary
      # quack-server ATTACHes to this endpoint.
      CUBEJS_PG_SQL_PORT: "15432"
      CUBEJS_SQL_USER: cube
      CUBEJS_SQL_PASSWORD: cube
      # Stable, non-secret JWT secret — fine for a localhost demo.
      # Override to a real secret if exposing Cube beyond loopback.
      CUBEJS_API_SECRET: demo-not-a-secret
    volumes:
      # Model + config, read-only. Cube Store's rocksdb metastore
      # (which Cube writes under conf/.cubestore) goes to a named
      # volume mounted over that subpath, so the container never
      # writes into the working tree.
      - ./cube:/cube/conf:ro
      - cube-store:/cube/conf/.cubestore
      # Not :ro — Cube's DuckDB driver opens the file in read/write
      # mode (even for read queries). Cube-seed populates it once at
      # startup; nothing else writes to it after that.
      - cube-data:/cube-data
    ports:
      - "4000:4000"   # REST + GraphQL + Cube Playground
      - "15432:15432" # SQL API (Postgres protocol)
    deploy:
      resources:
        limits:
          memory: 2g
    depends_on:
      cube-seed:
        condition: service_completed_successfully
    healthcheck:
      # Cube exposes a readyz endpoint on the REST port. The image
      # has no wget/curl/nc, just Node — drive it via a one-liner
      # that exits non-zero on any HTTP error or response other
      # than {"health":"HEALTH"}.
      test:
        - "CMD"
        - "node"
        - "-e"
        - >-
          require('http').get('http://127.0.0.1:4000/readyz', r => {
            let b = ''; r.on('data', c => b += c);
            r.on('end', () => { if (r.statusCode === 200 && b.includes('HEALTH')) process.exit(0); else process.exit(1); });
          }).on('error', () => process.exit(1));
      interval: 3s
      timeout: 2s
      retries: 40
    profiles: ["bi"]

  # ---------------------------------------------------------------
  # Superset — Apache Superset (Apache 2.0) wired to Cube's SQL API
  # to demonstrate the BI surface of the semantic layer. The same
  # cubes that back the cube_* Toolbox tools (codegen'd from
  # cube/model/cubes/*.yml) are what Superset queries through
  # postgresql+psycopg2://cube:cube@cube:15432/db.
  #
  # bootstrap.sh:
  #   1. `superset db upgrade`  (apply metastore migrations)
  #   2. `superset fab create-admin --username admin --password admin`
  #   3. `superset init`
  #   4. start gunicorn on :8088
  #   5. wait for /health, run bootstrap.py (registers the Cube DB +
  #      pre-builds dataset + chart + dashboard via Superset REST API)
  #
  # All steps are idempotent so `docker compose restart superset`
  # is safe. Metastore lives in a Compose volume so dashboards
  # persist across restarts. Runs as the image's `superset` user;
  # everything bootstrap writes lives under /app/superset_home (the
  # volume), which the image ships superset-owned.
  # ---------------------------------------------------------------
  superset:
    # The upstream apache/superset image ships SQLAlchemy but no
    # Postgres driver. psycopg2-binary is the standard Superset
    # add-on for talking to Postgres-protocol backends (including
    # Cube's SQL API). Extend the image inline so the demo stays
    # in this one Compose file with no separate Dockerfile.
    build:
      context: ./superset
      dockerfile_inline: |
        FROM apache/superset:4.1.2
        USER root
        RUN pip install --no-cache-dir psycopg2-binary==2.9.9
        USER superset
    environment:
      SUPERSET_SECRET_KEY: ${SUPERSET_SECRET_KEY:-demo-not-a-secret-rotate-me-before-prod}
      SUPERSET_LOAD_EXAMPLES: "no"
      SUPERSET_ADMIN_USERNAME: ${SUPERSET_ADMIN_USERNAME:-admin}
      SUPERSET_ADMIN_PASSWORD: ${SUPERSET_ADMIN_PASSWORD:-admin}
      SUPERSET_ADMIN_EMAIL: admin@example.com
      # PYTHONPATH so superset_config.py is found.
      PYTHONPATH: /app/pythonpath
    volumes:
      - ./superset/superset_config.py:/app/pythonpath/superset_config.py:ro
      - ./superset/bootstrap.sh:/app/bootstrap.sh:ro
      - ./superset/bootstrap.py:/app/bootstrap.py:ro
      - superset-data:/app/superset_home
    ports:
      - "8088:8088"
    entrypoint: ["/bin/bash", "/app/bootstrap.sh"]
    deploy:
      resources:
        limits:
          memory: 2g
    depends_on:
      cube:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:8088/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 60
      start_period: 60s
    profiles: ["bi"]

  # ---------------------------------------------------------------
  # Data-engineering track: dlt + dbt-duckdb + Dagster.
  # Profile `dataeng` together with quack-server-3.
  #
  # Demonstrates the full EL → T → semantic → consumption loop on a
  # synthetic web-events dataset (separate from the seed.sql data
  # that backs the rest of the demo). Dagster orchestrates dlt
  # ingest + dbt transform as one asset graph and exposes a UI on
  # :3000.
  #
  # The pipeline writes Parquet snapshots into a shared volume;
  # quack-server-3 mounts the same volume read-only and serves the
  # dbt-produced tables over Quack so the existing MCP Toolbox
  # source plumbing reaches them.
  # ---------------------------------------------------------------
  dagster:
    build: ./dagster
    environment:
      DAGSTER_HOME: /dagster_home
      # dlt's filesystem destination defaults to gzip'd JSONL named
      # *.jsonl — confusing to debug. Pin to plain Parquet so dbt's
      # read_parquet picks it up natively.
      DESTINATION__FILESYSTEM__LOADER_FILE_FORMAT: parquet
    volumes:
      - analytics-engineered-data:/data
      - dagster-home:/dagster_home
    ports:
      - "3000:3000"
    deploy:
      resources:
        limits:
          memory: 2g
    healthcheck:
      # /server_info returns JSON once gunicorn + the daemon are up.
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; urllib.request.urlopen('http://127.0.0.1:3000/server_info', timeout=3).read(); sys.exit(0)\""]
      interval: 5s
      timeout: 3s
      retries: 60
      start_period: 90s
    profiles: ["dataeng"]

  # Third Quack server (engineered warehouse). Same image as the
  # other two; mounts the analytics-engineered-data volume read-only
  # and serves the dbt-produced Parquet views instead of the baked-in
  # seed. Its own (throwaway) DuckDB file goes to a container-local
  # path via QUACK_DB_PATH so the shared volume can stay :ro.
  quack-server-3:
    build: ./quack-server
    environment:
      QUACK_TOKEN: ${QUACK_TOKEN_ENGINEERED:?set QUACK_TOKEN_ENGINEERED in .env}
      QUACK_PORT: "9494"
      QUACK_DB_PATH: /tmp/analytics.duckdb
    volumes:
      # Same volume Dagster writes to — read-only here; this server
      # only reads the dbt/dlt outputs (and the .bootstrap-ok
      # sentinel) under /data.
      - analytics-engineered-data:/data:ro
      # Mount-over the baked-in seed-based init with the engineered
      # variant: no seed, just CREATE VIEW over read_parquet for
      # each dbt model output.
      - ./quack-server/init-engineered.sql.tmpl:/quack/init.sql.tmpl:ro
    healthcheck:
      # Port open AND the Dagster bootstrap sentinel present. Without
      # the sentinel check, a failed dlt/dbt bootstrap would leave
      # this server "healthy" while serving views over Parquet files
      # that don't exist.
      test: ["CMD-SHELL", "nc -z 127.0.0.1 9494 && [ -f /data/.bootstrap-ok ]"]
      interval: 2s
      timeout: 1s
      retries: 30
    deploy:
      resources:
        limits:
          memory: 1g
    depends_on:
      dagster:
        condition: service_healthy
    profiles: ["dataeng"]

volumes:
  cube-data:
  cube-store:
  superset-data:
  analytics-engineered-data:
  dagster-home:
  grafana-data:
